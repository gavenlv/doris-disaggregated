apiVersion: v1
kind: ConfigMap
metadata:
  name: doris-cn-config
  namespace: doris
data:
  cn.conf: |
    cn_port = 9060
    webserver_port = 8040
    heartbeat_service_port = 9050
    brpc_port = 8060
    meta_service_endpoint = doris-ms:8080
    frontend_endpoint = doris-fe:9020
    enable_datacache = true
    datacache_path = /opt/doris/cn/cache
    datacache_size = 10737418240
    mem_limit = 8589934592
    num_threads_per_core = 2
    scan_thread_pool_thread_num = 16
    send_thread_pool_thread_num = 8
    enable_pipeline_engine = true
    pipeline_task_thread_pool_size = 16
    enable_vectorized_engine = true
    enable_query_cache = true
    query_cache_size = 2147483648
    log_dir = /opt/doris/cn/log
    sys_log_level = INFO
    disagg_storage = true
    cloud_storage_type = S3
    s3_endpoint = http://minio:9000
    s3_region = us-east-1
    s3_bucket = doris-data
    s3_access_key = minioadmin
    s3_secret_key = minioadmin
    s3_path_style_access = true
    graceful_shutdown_seconds = 30
---
apiVersion: v1
kind: Service
metadata:
  name: doris-cn-headless
  namespace: doris
  labels:
    app: doris-cn
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: doris-cn
  ports:
  - name: cn
    port: 9060
    targetPort: 9060
  - name: webserver
    port: 8040
    targetPort: 8040
  - name: brpc
    port: 8060
    targetPort: 8060
---
apiVersion: v1
kind: Service
metadata:
  name: doris-cn
  namespace: doris
  labels:
    app: doris-cn
spec:
  type: ClusterIP
  selector:
    app: doris-cn
  ports:
  - name: cn
    port: 9060
    targetPort: 9060
  - name: webserver
    port: 8040
    targetPort: 8040
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doris-cn
  namespace: doris
  labels:
    app: doris-cn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doris-cn
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: doris-cn
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: wait-for-fe
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z doris-fe 9030; do echo waiting for frontend; sleep 2; done']
      containers:
      - name: compute-node
        image: apache/doris:cn-4.0.4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          /opt/doris/cn/bin/start_cn.sh --daemon
          tail -f /opt/doris/cn/log/cn.INFO
        ports:
        - name: cn
          containerPort: 9060
        - name: webserver
          containerPort: 8040
        - name: brpc
          containerPort: 8060
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: cn-cache
          mountPath: /opt/doris/cn/cache
        - name: cn-log
          mountPath: /opt/doris/cn/log
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/bash
              - -c
              - |
                /opt/doris/cn/bin/stop_cn.sh --graceful
                sleep 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8040
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8040
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: cn-cache
        emptyDir:
          sizeLimit: 10Gi
      - name: cn-log
        emptyDir: {}
