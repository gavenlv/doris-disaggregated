apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: doris-cn-hpa
  namespace: doris
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: doris-cn
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: doris_query_queue_depth
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: doris-be-hpa
  namespace: doris
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: doris-be
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 120
---
apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: doris-cn-monitoring
  namespace: doris
spec:
  selector:
    matchLabels:
      app: doris-cn
  endpoints:
  - port: webserver
    path: /metrics
    interval: 15s
---
apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: doris-fe-monitoring
  namespace: doris
spec:
  selector:
    matchLabels:
      app: doris-fe
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
---
apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: doris-be-monitoring
  namespace: doris
spec:
  selector:
    matchLabels:
      app: doris-be
  endpoints:
  - port: webserver
    path: /metrics
    interval: 15s
