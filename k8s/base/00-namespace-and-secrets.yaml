apiVersion: v1
kind: Namespace
metadata:
  name: doris
  labels:
    name: doris
    app.kubernetes.io/name: apache-doris
    app.kubernetes.io/version: "4.0.4"
---
apiVersion: v1
kind: Secret
metadata:
  name: doris-gcs-secret
  namespace: doris
type: Opaque
data:
  google-credentials.json: BASE64_ENCODED_SERVICE_ACCOUNT_JSON
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-nvme
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-ssd
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-rwo
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-balanced
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: doris-ingress
  namespace: doris
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "doris-ingress-ip"
    networking.gke.io/managed-certificates: "doris-cert"
    networking.gke.io/v1beta1.FrontendConfig: "doris-frontend-config"
spec:
  rules:
  - host: doris.example.com
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: doris-fe
            port:
              number: 8030
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: doris-frontend-config
  namespace: doris
spec:
  sslPolicy: doris-ssl-policy
  redirectToHttps:
    enabled: true
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: doris-cert
  namespace: doris
spec:
  domains:
  - doris.example.com
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: doris-network-policy
  namespace: doris
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: doris
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - ipBlock:
        cidr: 10.0.0.0/8
  egress:
  - to:
    - namespaceSelector: {}
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 10.0.0.0/8
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: doris-fe-pdb
  namespace: doris
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: doris-fe
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: doris-ms-pdb
  namespace: doris
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: doris-ms
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: doris-cn-pdb
  namespace: doris
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: doris-cn
