apiVersion: v1
kind: ConfigMap
metadata:
  name: doris-cn-config
  namespace: doris
data:
  cn.conf: |
    # Compute Node Configuration for Doris 4.0.4
    
    # Network
    cn_port = 9060
    webserver_port = 8040
    heartbeat_service_port = 9050
    brpc_port = 8060
    
    # Meta Service Connection
    meta_service_endpoint = doris-ms:8080
    
    # Frontend Connection
    frontend_endpoint = doris-fe:9020
    
    # Cache Configuration (Critical for Performance)
    enable_datacache = true
    datacache_path = /opt/doris/cn/cache
    datacache_size = 536870912000
    
    # Memory
    mem_limit = 68719476736
    
    # Performance
    num_threads_per_core = 2
    scan_thread_pool_thread_num = 64
    send_thread_pool_thread_num = 32
    
    # Pipeline Engine
    enable_pipeline_engine = true
    pipeline_task_thread_pool_size = 64
    
    # Vectorized Engine
    enable_vectorized_engine = true
    
    # Query Cache
    enable_query_cache = true
    query_cache_size = 10737418240
    
    # Log
    log_dir = /opt/doris/cn/log
    sys_log_level = INFO
    sys_log_roll_num = 10
    
    # Disaggregated Mode
    disagg_storage = true
    cloud_storage_type = GCS
    gcs_bucket = doris-data-bucket
    
    # Graceful Shutdown
    graceful_shutdown_seconds = 30
---
apiVersion: v1
kind: Service
metadata:
  name: doris-cn-headless
  namespace: doris
  labels:
    app: doris-cn
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: doris-cn
  ports:
  - name: cn
    port: 9060
    targetPort: 9060
  - name: webserver
    port: 8040
    targetPort: 8040
  - name: brpc
    port: 8060
    targetPort: 8060
---
apiVersion: v1
kind: Service
metadata:
  name: doris-cn
  namespace: doris
  labels:
    app: doris-cn
spec:
  type: ClusterIP
  selector:
    app: doris-cn
  ports:
  - name: cn
    port: 9060
    targetPort: 9060
  - name: webserver
    port: 8040
    targetPort: 8040
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doris-cn
  namespace: doris
  labels:
    app: doris-cn
spec:
  replicas: 3
  selector:
    matchLabels:
      app: doris-cn
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: doris-cn
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8040"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: doris-cn
              topologyKey: topology.kubernetes.io/zone
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            operator: In
            matchExpressions:
            - key: component
              operator: In
              values:
              - cn-spot
          - weight: 50
            operator: In
            matchExpressions:
            - key: component
              operator: In
              values:
              - cn-ondemand
      tolerations:
      - key: "cloud.google.com/gke-preemptible"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: wait-for-fe
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z doris-fe 9030; do echo waiting for frontend; sleep 2; done']
      containers:
      - name: compute-node
        image: apache/doris:cn-4.0.4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          /opt/doris/cn/bin/start_cn.sh --daemon
          tail -f /opt/doris/cn/log/cn.INFO
        ports:
        - name: cn
          containerPort: 9060
        - name: webserver
          containerPort: 8040
        - name: brpc
          containerPort: 8060
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: "16"
            memory: "64Gi"
          limits:
            cpu: "16"
            memory: "64Gi"
        volumeMounts:
        - name: cn-cache
          mountPath: /opt/doris/cn/cache
        - name: cn-log
          mountPath: /opt/doris/cn/log
        - name: gcs-credentials
          mountPath: /opt/doris/gcs
          readOnly: true
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/bash
              - -c
              - |
                /opt/doris/cn/bin/stop_cn.sh --graceful
                sleep 30
        livenessProbe:
          httpGet:
            path: /health
            port: 8040
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8040
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: cn-cache
        emptyDir:
          sizeLimit: 500Gi
      - name: cn-log
        emptyDir: {}
      - name: gcs-credentials
        secret:
          secretName: doris-gcs-secret
