apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: doris-be
  namespace: doris
  labels:
    app: doris-be
spec:
  serviceName: doris-be-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: doris-be
  template:
    metadata:
      labels:
        app: doris-be
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: wait-for-ms
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z doris-ms 8080; do echo waiting for meta-service; sleep 2; done']
      containers:
      - name: backend
        image: apache/doris:be-4.0.4
        imagePullPolicy: Never
        command:
        - /bin/bash
        - -c
        - |
          BE_CONF=/opt/apache-doris/be/conf/be.conf
          if [ ! -f ${BE_CONF} ]; then
            BE_CONF=/opt/doris/be/conf/be.conf
          fi
          echo "" >> ${BE_CONF}
          echo "meta_service_endpoint = doris-ms:8080" >> ${BE_CONF}
          echo "cloud_unique_id = 1:doris_instance:cloud_unique_id_be00" >> ${BE_CONF}
          echo "run_mode = disagg" >> ${BE_CONF}
          echo "meta_service_use_load_balancer = false" >> ${BE_CONF}
          echo "enable_file_cache = true" >> ${BE_CONF}
          echo "file_cache_path = [{\"path\":\"/opt/apache-doris/be/file_cache\",\"total_size\":10737418240,\"query_limit\":1073741824}]" >> ${BE_CONF}
          echo "storage_root_path = /opt/apache-doris/be/storage" >> ${BE_CONF}

          POD_IP=${POD_IP:-$(hostname -i)}
          MS_URL="http://doris-ms:8080"
          TOKEN="greedisgood9999"

          echo "=== Registering BE with Meta Service (IP: ${POD_IP}) ==="
          for i in $(seq 1 30); do
            if curl -sf "${MS_URL}/MetaService/http/get_instance?instance_id=doris_instance&token=${TOKEN}" > /dev/null 2>&1; then
              echo "Instance exists, registering BE node..."
              curl -sf -X POST "${MS_URL}/MetaService/http/add_cluster?token=${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"instance_id\":\"doris_instance\",\"cluster\":{\"type\":\"COMPUTE\",\"cluster_name\":\"default_compute_cluster\",\"cluster_id\":\"10001\",\"nodes\":[{\"cloud_unique_id\":\"1:doris_instance:cloud_unique_id_be00\",\"ip\":\"${POD_IP}\",\"heartbeat_port\":9050,\"be_port\":9060,\"brpc_port\":8060}]}}" \
                && echo "BE registered successfully" && break
              echo "Registration attempt ${i} failed, retrying..."
            else
              echo "Waiting for instance to be created (attempt ${i})..."
            fi
            sleep 5
          done

          echo "Starting BE..."
          BE_BIN=/opt/apache-doris/be/bin/start_be.sh
          if [ ! -f ${BE_BIN} ]; then
            BE_BIN=/opt/doris/be/bin/start_be.sh
          fi
          ${BE_BIN} --daemon
          sleep 10
          BE_LOG=/opt/apache-doris/be/log/be.INFO
          if [ ! -f ${BE_LOG} ]; then
            BE_LOG=/opt/doris/be/log/be.INFO
          fi
          tail -f ${BE_LOG}
        ports:
        - name: be
          containerPort: 9060
        - name: webserver
          containerPort: 8040
        - name: heartbeat
          containerPort: 9050
        - name: brpc
          containerPort: 8060
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            cpu: "1"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "8Gi"
        volumeMounts:
        - name: be-storage
          mountPath: /opt/apache-doris/be/storage
        - name: be-cache
          mountPath: /opt/apache-doris/be/file_cache
        - name: be-log
          mountPath: /opt/apache-doris/be/log
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - pgrep -f "doris_be" > /dev/null || exit 1
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - pgrep -f "doris_be" > /dev/null || exit 1
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: be-storage
        emptyDir: {}
      - name: be-cache
        emptyDir:
          sizeLimit: 10Gi
      - name: be-log
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: doris-be-headless
  namespace: doris
  labels:
    app: doris-be
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: doris-be
  ports:
  - name: be
    port: 9060
    targetPort: 9060
  - name: webserver
    port: 8040
    targetPort: 8040
  - name: heartbeat
    port: 9050
    targetPort: 9050
  - name: brpc
    port: 8060
    targetPort: 8060
---
apiVersion: v1
kind: Service
metadata:
  name: doris-be
  namespace: doris
  labels:
    app: doris-be
spec:
  type: ClusterIP
  selector:
