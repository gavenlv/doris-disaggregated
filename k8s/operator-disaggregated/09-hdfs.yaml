# HDFS for Doris Storage Vault (Local Testing)
apiVersion: v1
kind: ConfigMap
metadata:
  name: hdfs-config
  namespace: doris
data:
  core-site.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://hdfs-namenode:9000</value>
      </property>
    </configuration>
  hdfs-site.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>dfs.replication</name>
        <value>1</value>
      </property>
      <property>
        <name>dfs.namenode.name.dir</name>
        <value>/tmp/hadoop-root/dfs/name</value>
      </property>
      <property>
        <name>dfs.datanode.data.dir</name>
        <value>/tmp/hadoop-root/dfs/data</value>
      </property>
      <property>
        <name>dfs.permissions.enabled</name>
        <value>false</value>
      </property>
    </configuration>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hdfs-namenode
  namespace: doris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hdfs-namenode
  template:
    metadata:
      labels:
        app: hdfs-namenode
    spec:
      containers:
      - name: namenode
        image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
          name: rpc
        - containerPort: 9870
          name: http
        env:
        - name: CLUSTER_NAME
          value: doris-hdfs
        - name: CONF_dfs_namenode_name_dir
          value: /tmp/hadoop-root/dfs/name
        volumeMounts:
        - name: hdfs-config
          mountPath: /opt/hadoop-3.2.1/etc/hadoop/core-site.xml
          subPath: core-site.xml
        - name: hdfs-config
          mountPath: /opt/hadoop-3.2.1/etc/hadoop/hdfs-site.xml
          subPath: hdfs-site.xml
        - name: namenode-data
          mountPath: /tmp/hadoop-root/dfs/name
      volumes:
      - name: hdfs-config
        configMap:
          name: hdfs-config
      - name: namenode-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hdfs-namenode
  namespace: doris
spec:
  selector:
    app: hdfs-namenode
  ports:
  - port: 9000
    targetPort: 9000
    name: rpc
  - port: 9870
    targetPort: 9870
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hdfs-datanode
  namespace: doris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hdfs-datanode
  template:
    metadata:
      labels:
        app: hdfs-datanode
    spec:
      containers:
      - name: datanode
        image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9864
          name: http
        env:
        - name: SERVICE_PRECONDITION
          value: hdfs-namenode:9870
        volumeMounts:
        - name: hdfs-config
          mountPath: /opt/hadoop-3.2.1/etc/hadoop/core-site.xml
          subPath: core-site.xml
        - name: hdfs-config
          mountPath: /opt/hadoop-3.2.1/etc/hadoop/hdfs-site.xml
          subPath: hdfs-site.xml
        - name: datanode-data
          mountPath: /tmp/hadoop-root/dfs/data
      volumes:
      - name: hdfs-config
        configMap:
          name: hdfs-config
      - name: datanode-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hdfs-datanode
  namespace: doris
spec:
  selector:
    app: hdfs-datanode
  ports:
  - port: 9864
    targetPort: 9864
    name: http
